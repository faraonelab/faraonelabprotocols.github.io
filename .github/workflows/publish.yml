on:
  push:
    branches: [ main, updates ]
  pull_request:
    branches: [ main ]
    
name: Quarto Publish Encrypted

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R & Dependencies
        uses: r-lib/actions/setup-renv@v2

      - name: Install Node & Staticrypt
        run: |
          npm install -g staticrypt

      - name: Render and Encrypt
        run: |
          # 1. Build the site into the 'docs' folder
          quarto render
          
          # 2. Encrypt the 'docs' folder in-place
          # This overwrites clean files with encrypted versions
          staticrypt docs -r -o docs --short --password "${{ secrets.SITE_PASSWORD }}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true # Cleans the gh-pages branch to ensure no old files remain