on:
  push:
    branches: [ main ]

name: Quarto Publish Encrypted

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2

      - name: Install Staticrypt
        run: npm install -g staticrypt

      - name: Render and Encrypt
        run: |
          # 1. Clean and build
          rm -rf docs/
          quarto render
          
          # 2. Find and encrypt every .html file in the docs folder
          # This is more reliable than '-r' for CI environments
          find docs -name "*.html" -exec npx staticrypt@latest {} --password "${{ secrets.SITE_PASSWORD }}" --overwrite --short --verbose \;
          
          # 3. Verification: print the size of index.html to logs
          # If it is > 5KB, it worked.
          ls -lh docs/index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4