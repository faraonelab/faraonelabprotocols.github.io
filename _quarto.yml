project:
  type: website
  output-dir: _site

website:
  title: "Faraone Lab Protocols"
  site-url: https://faraonelab.github.io/protocols/
  back-to-top-navigation: true
  page-navigation: true
  search: true
  
  navbar:
    search: true
    title: false
    logo: images/faraone-logo.jpg
    background: "#FFF"
    logo-alt: "Faraone Research Group"
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
  
  sidebar:
    style: "docked"
    search: true
    collapse-level: 99
    contents:
      - section: "Welcome"
        contents:
          - content/general_welcome.qmd
      - section: "Lab Protocols"
        contents: 
          - section: "General Procedures"
            contents: content/general/*.qmd
          - section: "Equipment Manuals"
            contents: content/equipments/*.qmd

  page-footer: 
    background: "#F6F5F3"
    left: |
      Faraone Lab, [Acadia University](https://www.acadiau.ca), Department of Chemistry (117 Elliott Hall)<br>
      6 University Avenue - Wolfville, Nova Scotia B4P 2R6 Canada <br>
      Acadia University is located in Mi'kma'ki, the ancestral and unceded territory of the Mi’kmaw nation.
    center: |
      © 2026 &middot; Made with {{< fa brands r-project >}} and 
      [![](https://quarto.org/quarto.png){fig-alt="Quarto" width=65px}](https://quarto.org/) by Luis Anholeto
    right:
      - icon: github
        href: https://github.com/faraonelab/faraonelab.github.io.git

format:
  html:
    theme: 
      - yeti
      - styles/custom.scss
    mainfont: Nunito Sans
    toc: true
    link-external-newwindow: true
    smooth-scroll: true
    format-links: [pdf] 

  pdf:
    documentclass: scrreport
    papersize: letter
    toc: true
    number-sections: true
    colorlinks: true

execute:
  freeze: auto